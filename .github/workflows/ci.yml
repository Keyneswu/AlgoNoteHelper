name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Ruff
        run: uv run ruff check app tests

      - name: Pytest
        run: uv run pytest

  images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      # GHCR requires lowercase image names
      IMAGE_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image owner
        run: echo "IMAGE_OWNER_LC=${IMAGE_OWNER,,}" >> "$GITHUB_ENV"

      - name: Require NEXT_PUBLIC_APP_URL
        env:
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          if [ -z "${NEXT_PUBLIC_APP_URL}" ]; then
            echo "GitHub Variable NEXT_PUBLIC_APP_URL is required to bake the frontend image."
            exit 1
          fi
          echo "Using NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/algonote-api:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/algonote-api:main
          cache-from: type=gha,scope=algonote-api
          cache-to: type=gha,mode=max,scope=algonote-api

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/algonote-frontend:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_OWNER_LC }}/algonote-frontend:main
          cache-from: type=gha,scope=algonote-frontend
          cache-to: type=gha,mode=max,scope=algonote-frontend
